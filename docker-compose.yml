services:
  # --- PostgreSQL 数据库 ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-gp_strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-gp_admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-gp_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-gp_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Strapi CMS 后端 ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-gp_strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-gp_admin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-gp_secure_2024}
    volumes:
      - backend_uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # --- Next.js 前端 ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://localhost}
      STRAPI_URL: http://backend:1337
    depends_on:
      - backend

  # --- Nginx 反向代理 ---
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - backend_uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  backend_uploads:
